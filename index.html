<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工厂产线3D监控系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
          'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
        background: #0a0e1a;
        color: #e0e6f0;
      }

      .app-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* ===== Top Data Bar ===== */
      .top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 28px;
        padding: 12px 24px;
        background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0.7) 80%, transparent 100%);
        pointer-events: none;
      }

      .top-bar-card {
        pointer-events: auto;
        background: rgba(20, 28, 50, 0.85);
        border: 1px solid rgba(80, 140, 255, 0.25);
        border-radius: 10px;
        padding: 10px 22px;
        min-width: 150px;
        text-align: center;
        backdrop-filter: blur(8px);
        transition: border-color 0.3s;
      }

      .top-bar-card:hover {
        border-color: rgba(80, 140, 255, 0.6);
      }

      .top-bar-label {
        font-size: 11px;
        color: #7a8bb5;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .top-bar-value {
        font-size: 26px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        background: linear-gradient(135deg, #4fc3f7, #80d8ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .top-bar-unit {
        font-size: 12px;
        color: #7a8bb5;
        margin-left: 2px;
      }

      .top-bar-value.warning {
        background: linear-gradient(135deg, #ffb74d, #ffe082);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .top-bar-value.danger {
        background: linear-gradient(135deg, #ef5350, #ff8a80);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* ===== 3D Canvas ===== */
      .canvas-wrapper {
        flex: 1;
        position: relative;
      }

      /* ===== Right Station List ===== */
      .right-panel {
        position: absolute;
        top: 80px;
        right: 12px;
        bottom: 100px;
        width: 260px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
        padding-right: 4px;
        pointer-events: auto;
      }

      .right-panel::-webkit-scrollbar {
        width: 4px;
      }

      .right-panel::-webkit-scrollbar-track {
        background: transparent;
      }

      .right-panel::-webkit-scrollbar-thumb {
        background: rgba(80, 140, 255, 0.3);
        border-radius: 2px;
      }

      .station-card {
        background: rgba(16, 22, 40, 0.9);
        border: 1px solid rgba(80, 140, 255, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        backdrop-filter: blur(6px);
        transition: border-color 0.25s, transform 0.2s;
        cursor: default;
      }

      .station-card:hover {
        border-color: rgba(80, 140, 255, 0.5);
        transform: translateX(-2px);
      }

      .station-card.alarm {
        border-color: rgba(239, 83, 80, 0.6);
        animation: alarm-flash 1s ease-in-out infinite;
      }

      .station-card.maintenance {
        border-color: rgba(255, 152, 0, 0.5);
      }

      @keyframes maint-flash {
        0%, 100% { border-color: rgba(255, 152, 0, 0.5); box-shadow: 0 0 0 rgba(255,152,0,0); }
        50% { border-color: rgba(255, 152, 0, 0.9); box-shadow: 0 0 10px rgba(255,152,0,0.25); }
      }

      .station-card.maintenance:not(.alarm) {
        animation: maint-flash 2s ease-in-out infinite;
      }

      @keyframes alarm-flash {
        0%, 100% { border-color: rgba(239, 83, 80, 0.6); box-shadow: 0 0 0 rgba(239,83,80,0); }
        50% { border-color: rgba(239, 83, 80, 1); box-shadow: 0 0 12px rgba(239,83,80,0.3); }
      }

      .station-name {
        font-size: 13px;
        font-weight: 600;
        color: #b0c4ff;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .station-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .station-dot.green { background: #4caf50; box-shadow: 0 0 6px rgba(76,175,80,0.6); }
      .station-dot.yellow { background: #ffb74d; box-shadow: 0 0 6px rgba(255,183,77,0.6); }
      .station-dot.red { background: #ef5350; box-shadow: 0 0 6px rgba(239,83,80,0.6); }

      .maintenance-badge {
        font-size: 10px;
        background: rgba(255, 152, 0, 0.2);
        color: #ff9800;
        border: 1px solid rgba(255, 152, 0, 0.5);
        border-radius: 4px;
        padding: 1px 6px;
        margin-left: auto;
        font-weight: 600;
        letter-spacing: 0.5px;
        animation: badge-pulse 2s ease-in-out infinite;
      }

      @keyframes badge-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      .maintenance-btn {
        margin-top: 8px;
        width: 100%;
        padding: 6px 0;
        border: 1px solid rgba(255, 152, 0, 0.6);
        border-radius: 6px;
        background: rgba(255, 152, 0, 0.12);
        color: #ff9800;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        letter-spacing: 0.5px;
      }

      .maintenance-btn:hover {
        background: rgba(255, 152, 0, 0.25);
        border-color: rgba(255, 152, 0, 0.9);
      }

      .station-info {
        font-size: 11px;
        color: #7a8bb5;
        line-height: 1.6;
      }

      .station-info span {
        color: #c8d6f0;
        font-weight: 500;
      }

      .station-count {
        margin-top: 4px;
        font-size: 20px;
        font-weight: 700;
        color: #4fc3f7;
        font-variant-numeric: tabular-nums;
      }

      /* ===== Bottom Timeline ===== */
      .bottom-timeline {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 10px 24px 14px;
        background: linear-gradient(0deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0.7) 80%, transparent 100%);
        pointer-events: auto;
      }

      .timeline-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }

      .timeline-title {
        font-size: 12px;
        color: #7a8bb5;
        letter-spacing: 1px;
      }

      .timeline-time {
        font-size: 13px;
        color: #b0c4ff;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .timeline-slider-wrap {
        position: relative;
        height: 24px;
        display: flex;
        align-items: center;
      }

      .timeline-slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: rgba(80, 140, 255, 0.15);
        outline: none;
        cursor: pointer;
      }

      .timeline-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4fc3f7;
        box-shadow: 0 0 8px rgba(79,195,247,0.5);
        cursor: pointer;
        transition: transform 0.15s;
      }

      .timeline-slider::-webkit-slider-thumb:hover {
        transform: scale(1.3);
      }

      .timeline-marks {
        display: flex;
        justify-content: space-between;
        margin-top: 2px;
        padding: 0 6px;
      }

      .timeline-mark {
        font-size: 10px;
        color: #4a5a80;
        font-variant-numeric: tabular-nums;
      }

      /* ===== Device Detail Tooltip ===== */
      .device-detail {
        position: absolute;
        z-index: 200;
        background: rgba(12, 18, 36, 0.95);
        border: 1px solid rgba(80, 140, 255, 0.4);
        border-radius: 10px;
        padding: 16px 20px;
        min-width: 220px;
        backdrop-filter: blur(10px);
        pointer-events: none;
        animation: tooltip-in 0.2s ease-out;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }

      @keyframes tooltip-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .device-detail-title {
        font-size: 15px;
        font-weight: 700;
        color: #b0c4ff;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(80, 140, 255, 0.15);
      }

      .device-detail-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
        font-size: 12px;
      }

      .device-detail-key {
        color: #7a8bb5;
      }

      .device-detail-val {
        color: #e0e6f0;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }

      .device-detail-val.good { color: #4caf50; }
      .device-detail-val.warn { color: #ffb74d; }
      .device-detail-val.bad  { color: #ef5350; }

      .device-alert {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(239, 83, 80, 0.12);
        border: 1px solid rgba(239, 83, 80, 0.3);
        font-size: 11px;
        color: #ff8a80;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .device-alert-icon {
        font-size: 14px;
      }

      /* ===== Alarm Banner ===== */
      .alarm-banner {
        position: absolute;
        top: 72px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 150;
        background: rgba(239, 83, 80, 0.15);
        border: 1px solid rgba(239, 83, 80, 0.5);
        border-radius: 8px;
        padding: 8px 24px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: alarm-banner-in 0.3s ease-out;
        backdrop-filter: blur(8px);
      }

      @keyframes alarm-banner-in {
        from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
      }

      .alarm-banner-icon {
        font-size: 18px;
        animation: alarm-icon-pulse 0.8s ease-in-out infinite;
      }

      @keyframes alarm-icon-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .alarm-banner-text {
        font-size: 13px;
        color: #ff8a80;
        font-weight: 500;
      }

      .alarm-banner-close {
        margin-left: 12px;
        background: none;
        border: none;
        color: #ff8a80;
        font-size: 16px;
        cursor: pointer;
        padding: 0 4px;
        line-height: 1;
      }

      /* ===== Responsive ===== */
      @media (max-width: 900px) {
        .right-panel {
          display: none;
        }
      }

      @media (max-width: 700px) {
        .top-bar {
          gap: 10px;
          padding: 8px 10px;
        }
        .top-bar-card {
          min-width: 80px;
          padding: 8px 10px;
        }
        .top-bar-value {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
